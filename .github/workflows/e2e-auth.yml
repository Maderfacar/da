name: E2E Auth Matrix

# 風險覆蓋：Tier A（公開/受保護路由 + LIFF redirect guard）+ Tier B（cold/warm boot、role gate、
# 401 retry、lazy read timeout）共 10 個自動化場景。Tier C 4 場景由 Brain AI 手動驗收。
#
# 設計：
#   - 採方案 B（auth.client.ts 內既有 testMode='T' 後門 + window.__E2E_MODE__ 旗標）
#   - CI 用 minimal .env.dev（NUXT_PUBLIC_TEST_MODE=T + 必要 base url）；plugin 跳過 LIFF/Firebase init
#   - 所有 /nuxt-api/* request 由 fixture page.route 攔截，不打真實後端
#   - 不需要任何 Firebase / LINE / Google Maps secret

on:
  push:
    branches: [main]
    paths:
      - 'tests/e2e/auth/**'
      - 'app/plugins/auth.client.ts'
      - 'app/middleware/auth.ts'
      - 'app/middleware/role.ts'
      - 'app/stores/5.store-auth.ts'
      - 'app/protocol/fetch-api/methods.ts'
      - 'shared/auth/**'
      - 'shared/constants/auth-public-routes**'
      - 'app/composables/use-roles-load-guard.ts'
      - 'app/composables/use-liff-redirect-guard.ts'
      - 'app/layouts/front-desk.vue'
      - 'playwright.config.ts'
      - '.github/workflows/e2e-auth.yml'
  pull_request:
    branches: [main]

jobs:
  auth-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          # CLAUDE.md 要求 Node >= 24.13.0
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write minimal .env.dev (CI)
        # plugin 看到 NUXT_PUBLIC_TEST_MODE=T 直接 mock，跳過 LIFF/Firebase init
        # 所有 secret 不需要；server endpoint 由 page.route 攔截，dev server 不被打到
        run: |
          cat > .env.dev <<'EOF'
          NUXT_PUBLIC_TEST_MODE=T
          NUXT_API_BASE=http://localhost
          EOF

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run auth e2e suite
        # webServer (playwright.config) 在 CI=true 時自動起 pnpm dev
        run: pnpm test:e2e:auth
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/
          retention-days: 14
